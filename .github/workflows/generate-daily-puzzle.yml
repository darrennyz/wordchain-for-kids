name: Generate Daily Puzzle

on:
  schedule:
    # Run at midnight Singapore time (SGT = UTC+8, so 4pm UTC)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate WordChain puzzles (stockpile 20 days)
        run: node scripts/generate-puzzles.js 20
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Generate Sudoku puzzles (stockpile 20 days)
        run: node scripts/generate-sudoku-puzzles.js 20
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
